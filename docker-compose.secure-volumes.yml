# Docker Compose - Secure Volume Permissions Configuration
# AI Trading Bot with Enterprise-Grade Volume Security
# Generated by Volume Permissions Security System

version: '3.8'

services:
  # Main AI Trading Bot with Secure Volume Mounts
  ai-trading-bot:
    image: ai-trading-bot:secure
    container_name: ai-trading-bot-secure
    
    # Security Configuration
    user: "1001:1001"                    # Non-root user
    read_only: true                      # Read-only root filesystem
    
    security_opt:
      - no-new-privileges:true           # Prevent privilege escalation
      - apparmor:docker-trading-bot      # AppArmor security profile
      - seccomp:seccomp-trading-bot.json # Seccomp security profile
    
    cap_drop:
      - ALL                              # Drop all capabilities
    
    # Resource Limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    
    # Secure Volume Mounts
    volumes:
      # Application Data - Read/Write with high security
      - type: bind
        source: ./volumes/data
        target: /app/data
        bind:
          create_host_path: true
        read_only: false
      
      # Configuration - Read-only for security
      - type: bind
        source: ./volumes/config
        target: /app/config
        bind:
          create_host_path: true
        read_only: true
      
      # Secrets - Read-only with maximum security
      - type: bind
        source: ./volumes/secrets
        target: /app/secrets
        bind:
          create_host_path: true
        read_only: true
      
      # Logs - Write access for application logging
      - type: bind
        source: ./volumes/logs
        target: /app/logs
        bind:
          create_host_path: true
        read_only: false
      
      # Backups - Write access for backup storage
      - type: bind
        source: ./volumes/backups
        target: /app/backups
        bind:
          create_host_path: true
        read_only: false
    
    # Temporary filesystems (in-memory, secure)
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/tmp:noexec,nosuid,size=50m
      - /run:noexec,nosuid,size=50m
    
    # Environment variables (non-sensitive only)
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - SECURITY_MODE=strict
    
    # Health check
    healthcheck:
      test: ["CMD", "python3", "/app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Network security
    networks:
      - trading_secure
      - db_secure
    
    # Restart policy
    restart: unless-stopped
    
    depends_on:
      - redis-secure
      - volume-monitor

  # Redis with Secure Volume Configuration
  redis-secure:
    image: redis:7-alpine
    container_name: redis-secure
    
    # Security Configuration
    user: "999:999"                      # Redis non-root user
    read_only: true
    
    security_opt:
      - no-new-privileges:true
    
    cap_drop:
      - ALL
    
    # Redis data volume with proper permissions
    volumes:
      - type: bind
        source: ./volumes/redis
        target: /data
        bind:
          create_host_path: true
        read_only: false
    
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    
    networks:
      - db_secure
    
    restart: unless-stopped

  # Volume Security Monitor
  volume-monitor:
    image: python:3.11-alpine
    container_name: volume-security-monitor
    
    # Security Configuration
    user: "1002:1002"                    # Dedicated monitoring user
    read_only: true
    
    security_opt:
      - no-new-privileges:true
    
    cap_drop:
      - ALL
    
    # Monitor volumes (read-only access)
    volumes:
      - type: bind
        source: ./volumes
        target: /monitor/volumes
        bind:
          create_host_path: true
        read_only: true
      
      - type: bind
        source: ./volume_security
        target: /monitor/reports
        bind:
          create_host_path: true
        read_only: false
      
      - type: bind
        source: ./volume_permissions_security_system.py
        target: /monitor/scanner.py
        read_only: true
    
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    
    environment:
      - MONITOR_INTERVAL=3600          # Check every hour
      - ALERT_THRESHOLD=HIGH           # Alert on HIGH+ risk
    
    command: >
      sh -c "
        pip install pyyaml asyncio &&
        while true; do
          echo '🔍 Running volume security scan...' &&
          python3 /monitor/scanner.py &&
          sleep $$MONITOR_INTERVAL
        done
      "
    
    networks:
      - trading_secure
    
    restart: unless-stopped

  # Log Collector with Secure Volume Access
  log-collector:
    image: fluentd:v1.16-alpine
    container_name: log-collector-secure
    
    # Security Configuration  
    user: "100:101"                      # Fluentd user
    read_only: true
    
    security_opt:
      - no-new-privileges:true
    
    cap_drop:
      - ALL
    
    # Access to log volumes (read-only)
    volumes:
      - type: bind
        source: ./volumes/logs
        target: /fluentd/log/input
        bind:
          create_host_path: true
        read_only: true
      
      - type: bind
        source: ./fluentd/conf
        target: /fluentd/etc
        read_only: true
      
      - type: bind
        source: ./volumes/log_archive
        target: /fluentd/log/output
        read_only: false
    
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    
    networks:
      - trading_secure
    
    restart: unless-stopped

# Network Configuration
networks:
  trading_secure:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"
    internal: false  # Allow external access for API calls
    
  db_secure:
    driver: bridge
    internal: true   # Internal network for database access

# Volume Security Initialization
x-volume-setup: &volume-setup
  # This section documents the required volume setup
  # Run these commands before starting containers:
  # 
  # mkdir -p ./volumes/{data,config,secrets,logs,backups,redis,log_archive}
  # 
  # # Set ownership to non-root users
  # chown -R 1001:1001 ./volumes/{data,config,secrets,logs,backups}
  # chown -R 999:999 ./volumes/redis
  # chown -R 100:101 ./volumes/log_archive
  # 
  # # Set secure permissions
  # chmod 750 ./volumes/data ./volumes/config ./volumes/logs ./volumes/backups
  # chmod 700 ./volumes/secrets
  # chmod 755 ./volumes/redis ./volumes/log_archive
  # 
  # # Set file permissions
  # find ./volumes/data -type f -exec chmod 640 {} \;
  # find ./volumes/config -type f -exec chmod 640 {} \;
  # find ./volumes/secrets -type f -exec chmod 600 {} \;
  # find ./volumes/logs -type f -exec chmod 640 {} \;

# Security Notes and Best Practices
x-security-notes:
