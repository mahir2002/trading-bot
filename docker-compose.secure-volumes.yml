    - "All volumes use specific non-root users (1001, 999, 100, 1002)"
    - "Secrets volume has maximum security (700/600 permissions)"
    - "Configuration mounted read-only to prevent tampering"
    - "Temporary filesystems prevent persistent malware"
    - "Volume monitoring runs continuously"
    - "All containers run with read-only root filesystem"
    
  network_security:
    - "Internal network for database isolation"
    - "External network bound to localhost only"
    - "No privileged network access"
    
  runtime_security:
    - "No new privileges allowed"
    - "All Linux capabilities dropped"
    - "AppArmor and Seccomp profiles enforced"
    - "Resource limits prevent DoS attacks"
    - "Health checks ensure service integrity"
    
  monitoring:
    - "Automated volume permission scanning"
    - "Real-time security alerting"
    - "Log aggregation and analysis"
    - "Continuous compliance monitoring"

# Environment Variables (create .env file)
x-environment-template:
  required_variables:
    - REDIS_PASSWORD=secure_redis_password_here
    - BINANCE_API_KEY=your_binance_api_key
    - BINANCE_SECRET_KEY=your_binance_secret_key
    - TELEGRAM_BOT_TOKEN=your_telegram_bot_token
    - LOG_LEVEL=INFO
    - ENVIRONMENT=production
  
  security_notes:
    - "Store sensitive variables in ./volumes/secrets/ files"
    - "Use Docker secrets for production deployment"
    - "Never commit secrets to version control"
    - "Rotate secrets regularly" 